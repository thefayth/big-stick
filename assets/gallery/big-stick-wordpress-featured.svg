<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Big Stick WordPress featured image</title>
  <desc id="desc">Abstract command-board artwork for the Big Stick public project page, with public/private review lanes and receipt motifs.</desc>
