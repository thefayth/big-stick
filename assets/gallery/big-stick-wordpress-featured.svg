  <rect x="166" y="430" width="286" height="150" rx="14" fill="#f3ead8" opacity=".12"/>
  <rect x="590" y="130" width="820" height="150" rx="18" fill="#ffffff" stroke="#34363d" stroke-opacity=".28" stroke-width="3"/>
